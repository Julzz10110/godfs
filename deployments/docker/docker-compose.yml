services:
  master:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile.master
    ports:
      - "9090:9090"
      - "9091:9091"
    environment:
      GODFS_MASTER_LISTEN: "0.0.0.0:9090"
      GODFS_METRICS_LISTEN: "0.0.0.0:9091"
      GODFS_REPLICATION: "1"

  chunk:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile.chunkserver
    ports:
      - "8000:8000"
      - "9092:9091"
    environment:
      GODFS_MASTER: "master:9090"
      GODFS_ADVERTISE_ADDR: "chunk:8000"
      GODFS_CHUNK_LISTEN: "0.0.0.0:8000"
      GODFS_CHUNK_DATA: "/var/lib/godfs/data"
      GODFS_METRICS_LISTEN: "0.0.0.0:9091"
    volumes:
      - chunkdata:/var/lib/godfs
    depends_on:
      - master

  rest:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile.restgateway
    ports:
      - "8080:8080"
    environment:
      GODFS_MASTER: "master:9090"
      GODFS_CHUNK_SIZE_BYTES: "67108864"
      GODFS_REST_LISTEN: "0.0.0.0:8080"
      GODFS_REST_READ_TIMEOUT: "0"
      GODFS_REST_WRITE_TIMEOUT: "0"
    depends_on:
      - chunk

volumes:
  chunkdata: {}

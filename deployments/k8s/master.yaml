# Single-node Master (no Raft). For production Raft clusters use StatefulSet + headless Service
# and configure GODFS_MASTER_* from ConfigMaps/Secrets.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: godfs-master
  namespace: godfs
  labels:
    app.kubernetes.io/name: godfs-master
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: godfs-master
  template:
    metadata:
      labels:
        app.kubernetes.io/name: godfs-master
    spec:
      containers:
        - name: master
          image: godfs-master:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: grpc
              containerPort: 9090
            - name: metrics
              containerPort: 9091
          env:
            - name: GODFS_MASTER_GRPC_LISTEN
              value: "0.0.0.0:9090"
            - name: GODFS_METRICS_LISTEN
              value: "0.0.0.0:9091"
            # TLS: mount secrets and set GODFS_TLS_ENABLED, cert paths, CA.
            # Auth: use Secret for GODFS_CLUSTER_KEY / GODFS_API_KEYS.
            # OTEL: set OTEL_EXPORTER_OTLP_ENDPOINT or GODFS_OTEL_EXPORTER_OTLP_ENDPOINT
          readinessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 2
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: godfs-master
  namespace: godfs
spec:
  selector:
    app.kubernetes.io/name: godfs-master
  ports:
    - name: grpc
      port: 9090
      targetPort: grpc
    - name: metrics
      port: 9091
      targetPort: metrics

# HTTP REST gateway → Master gRPC (Bearer from client per request; do not set GODFS_CLIENT_API_KEY in the pod).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: godfs-restgateway
  namespace: godfs
  labels:
    app.kubernetes.io/name: godfs-restgateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: godfs-restgateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: godfs-restgateway
    spec:
      containers:
        - name: restgateway
          image: godfs-restgateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
            - name: metrics
              containerPort: 9091
          env:
            - name: GODFS_MASTER
              value: "godfs-master.godfs.svc.cluster.local:9090"
            - name: GODFS_REST_LISTEN
              value: "0.0.0.0:8080"
            - name: GODFS_METRICS_LISTEN
              value: "0.0.0.0:9091"
            # Chunk size must match Master (default 64 MiB if unset on both).
            # - name: GODFS_CHUNK_SIZE_BYTES
            #   value: "67108864"
            # TLS to Master: mount Secret and set GODFS_TLS_*.
            # OTLP: OTEL_EXPORTER_OTLP_ENDPOINT or GODFS_OTEL_EXPORTER_OTLP_ENDPOINT
          readinessProbe:
            httpGet:
              path: /v1/health
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: godfs-restgateway
  namespace: godfs
spec:
  selector:
    app.kubernetes.io/name: godfs-restgateway
  ports:
    - name: http
      port: 8080
      targetPort: http
    - name: metrics
      port: 9091
      targetPort: metrics

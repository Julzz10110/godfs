name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.1
          args: --timeout=8m

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Vet
        run: go vet ./...

      - name: Test (all packages except e2e)
        run: |
          set -e
          mapfile -t pkgs < <(go list ./... | grep -v '^godfs/test/e2e$' || true)
          if [ "${#pkgs[@]}" -eq 0 ]; then echo "no packages"; exit 1; fi
          go test "${pkgs[@]}" -count=1 -timeout 10m

      - name: E2E (incl. Raft failover)
        run: go test ./test/e2e -count=1 -timeout=15m -v

      - name: Build FUSE (Linux)
        run: go build -o /tmp/godfs-fuse ./cmd/fuse

      - name: Client micro-benchmark gate (ns/op)
        run: bash scripts/bench_gate.sh

  rest-compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build and start stack
        run: docker compose -f deployments/docker/docker-compose.yml up -d --build

      - name: REST smoke (curl)
        run: bash scripts/rest_compose_smoke.sh

      - name: Integration tests (REST)
        run: go test ./test/integration -tags=integration -count=1 -timeout=5m -v

      - name: Chaos smoke (chunk restart)
        run: bash scripts/compose_chaos_smoke.sh

      - name: Tear down
        if: always()
        run: docker compose -f deployments/docker/docker-compose.yml down -v

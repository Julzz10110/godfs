name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -count=1 -timeout 15m

  rest-compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and start stack
        run: docker compose -f deployments/docker/docker-compose.yml up -d --build

      - name: REST smoke (curl)
        run: bash scripts/rest_compose_smoke.sh

      - name: Tear down
        if: always()
        run: docker compose -f deployments/docker/docker-compose.yml down -v
